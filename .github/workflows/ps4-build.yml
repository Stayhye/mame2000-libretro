name: Build MAME 2000 PS4

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-ps4:
    runs-on: ubuntu-latest
    # We use the specific OpenOrbis image. If 'latest' fails, we pull the specific SHA.
    container: ghcr.io/openorbis/toolchain:v1.1.0

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Libretro Core
        run: |
          # Set the toolchain path so the compiler can find its headers
          export OO_PS4_TOOLCHAIN=/usr/local/openorbis
          
          # Force the compiler to be orbis-clang
          # We use platform=ps4 which corresponds to your Makefile block
          make platform=ps4 -j$(nproc)

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mame2000_ps4_libretro
          path: |
            *.a
            *.elf
