name: Build MAME 2000 PS4

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-ps4:
    runs-on: ubuntu-latest
    # This image is more reliable and includes the full OpenOrbis environment
    container: ghcr.io/moms-friendly-development-community/orbis-toolchain:latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Libretro Core
        run: |
          # In this container, the toolchain is pre-configured
          # We force the platform to ps4 for the MAME Makefile
          make platform=ps4 -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mame2000_ps4
          path: |
            *.a
            *.elf
