name: Build MAME 2000 AvP (PS2)

on:
  push:
    branches: [ master, main ]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build AVP ELF
        run: |
          docker run --rm \
            -v $(pwd):/src \
            -w /src \
            ps2dev/ps2dev:latest \
            sh -c '
              set -e
              
              apk add --no-cache build-base git make
              
              export PS2DEV=/usr/local/ps2dev
              export PS2SDK=$PS2DEV/ps2sdk
              export PATH=$PATH:$PS2DEV/bin:$PS2DEV/ee/bin:$PS2SDK/bin

              # CREATE THE FULL MAME COMPATIBILITY LAYER
              cat << "EOF_FIX" > fix_cps2.h
          #ifndef FIX_CPS2_H
          #define FIX_CPS2_H

          typedef unsigned char data8_t;
          typedef unsigned short data16_t;
          typedef unsigned int data32_t;

          /* Structure definitions to fix "Storage Size Unknown" */
          struct MachineCPU { int cpu_type; int cpu_clock; const void *memory_read; const void *memory_write; const void *port_read; const void *port_write; void (*vblank_interrupt)(void); int vblank_interrupts_per_frame; };
          struct GfxDecodeInfo { int dummy; };
          struct QSound_interface { int dummy; };
          struct RomModule { unsigned int _name; unsigned int _offset; unsigned int _length; unsigned int _flags; };
          struct InputPortTiny { int dummy; };
          struct GameDriver { const char *year; const char *source_file; const char *name; const char *description; const void *rom; const void *parent; const void *drv; const void *input; void (*init)(void); const void *monitor; int flags; };

          struct MachineDriver {
              struct MachineCPU cpu[8];
              int frames_per_second;
              int vblank_duration;
              int cpu_slices_per_frame;
              void (*init_machine)(void);
              int screen_width, screen_height;
              struct GfxDecodeInfo *gfxdecodeinfo;
              int total_colors;
              int color_table_len;
              void (*vh_init_palette)(void*, const void*, const void*);
              int video_attributes;
              int (*vh_start)(void);
              void (*vh_stop)(void);
              void (*vh_update)(void*, int);
              int sound_attributes;
              int samples_per_frame;
              struct { int sound_type; void *sound_interface; } sound[5];
          };

          /* Macros to prevent "Expected { at end of input" */
          #define ROM_START(name) static const struct RomModule rom_##name[] = {
          #define ROM_END { 0, 0, 0, 0 } };
          #define PORT_START(name) static const struct InputPortTiny input_ports_##name[] = {
          #define PORT_END { 0 } };
          #define ROM_LOAD(name,offs,len,crc) { 0, offs, len, 0 },
          
          /* Game Driver Macros */
          #define GAMEX(year,name,parent,drv,input,init,monitor,flags,desc) \
          extern const struct GameDriver driver_##parent; \
          const struct GameDriver driver_##name = { #year, __FILE__, #name, desc, rom_##name, &driver_##parent, &machine_driver_##drv, input_ports_##input, init, monitor, flags };

          #define CPU_M68000 1
          #define CPU_Z80 2
          #define CPU_AUDIO_CPU 0x8000
          #define SOUND_QSOUND 1
          #define VIDEO_TYPE_RASTER 1
          #define VIDEO_MODIFIES_PALETTE 2

          /* Externs */
          extern const void *cps1_readmem, *cps1_writemem, *qsound_readmem, *qsound_writemem;
          extern struct GfxDecodeInfo cps1_gfxdecodeinfo[];
          extern struct QSound_interface qsound_interface;
          extern int cps1_qsound_interrupt(), cps2_vh_start();
          extern void cps2_vh_stop(), cps2_vh_screenrefresh();

          #endif
          EOF_FIX

              # Re-inject and clean the file of potential garbage
              sed -i "1i #include \"fix_cps2.h\"" src/drivers/cps2.c

              cat << "EOF_MAKE" > Makefile.ps2
          EE_BIN = AVP.ELF
          EE_OBJS = ps2_main.o src/driver.o src/drivers/cps2.o src/drivers/capcom.o src/vidhrdw/capcom.o src/sndhrdw/capcom.o src/libretro/libretro-common/libco/libco.o

          EE_INCS += -I. -Isrc -Isrc/includes -Isrc/ps2 -Isrc/libretro \
                     -Isrc/libretro/libretro-common/include \
                     -Isrc/sndhrdw -Isrc/vidhrdw -Isrc/cpu/m68000 \
                     -Isrc/cpu/z80 -Isrc/sound -Isrc/drivers
          
          EE_CFLAGS += -D_PS2 -DCPS2 -DLSB_FIRST -D__linux__ -DDECL_SPEC= \
                       -fpermissive -fno-strict-aliasing -fno-common \
                       -Wno-implicit-function-declaration -Wno-implicit-int \
                       -Wno-unused-variable -Wno-return-type
          
          EE_LIBS = -lpatches -ldebug -lstdc++ -lm -lc -lkernel

          include $(PS2SDK)/samples/Makefile.pref
          include $(PS2SDK)/samples/Makefile.eeglobal

          src/libretro/libretro-common/libco/libco.o: src/libretro/libretro-common/libco/libco.c
          	$(EE_CC) $(EE_CFLAGS) $(EE_INCS) -c $< -o $@
          EOF_MAKE

          printf "#include <stdio.h>\nint main() { return 0; }\n" > ps2_main.c
          
          echo "--- BUILDING ---"
          make -f Makefile.ps2 -j1
            '
