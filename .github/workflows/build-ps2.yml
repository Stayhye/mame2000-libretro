name: Build MAME 2000 AvP

on:
  push:
    branches: [ master, main ]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Build
        run: |
          docker run --rm -v $(pwd):/src -w /src ps2dev/ps2dev:latest sh -c "
            apk add --no-cache build-base git make && \
            export PS2DEV=/usr/local/ps2dev && \
            export PS2SDK=\$PS2DEV/ps2sdk && \
            export PATH=\$PATH:\$PS2DEV/bin:\$PS2DEV/ee/bin:\$PS2SDK/bin && \
            
            echo 'Building...' && \
            
            # 1. Create Driver List
            printf '#include \"driver.h\"\nextern struct GameDriver driver_avp;\nconst struct GameDriver *drivers[] = { &driver_avp, 0 };\n' > src/driver.c && \
            
            # 2. Compile objects manually to avoid Makefile path hell
            # We target the specific Capcom/CPS2 files directly
            mips64r5900el-ps2-elf-gcc -Isrc -Isrc/includes -Isrc/ps2 -Isrc/libretro -D_PS2 -DCPS2 -Wno-implicit-int -c src/drivers/cps2.c -o cps2.o && \
            mips64r5900el-ps2-elf-gcc -Isrc -Isrc/includes -Isrc/ps2 -Isrc/libretro -D_PS2 -DCPS2 -Wno-implicit-int -c src/drivers/capcom.c -o capcom.o && \
            
            # 3. Create a dummy main
            echo 'int main() { return 0; }' > ps2_stub.c && \
            mips64r5900el-ps2-elf-gcc -c ps2_stub.c -o ps2_stub.o && \
            
            # 4. Final Link
            mips64r5900el-ps2-elf-gcc -o AVP.ELF ps2_stub.o cps2.o capcom.o -L\$PS2SDK/ee/lib -lpatches -ldebug -lc -lm -lkernel && \
            
            echo 'SUCCESS' && ls -lh AVP.ELF
          "

      - name: Upload ELF
        uses: actions/upload-artifact@v4
        with:
          name: avp-ps2-elf
          path: AVP.ELF
