name: Build MAME 2000 AvP (PS2)

on:
  push:
    branches: [ master, main ]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build AVP ELF
        run: |
          docker run --rm \
            -v $(pwd):/src \
            -w /src \
            ps2dev/ps2dev:latest \
            sh -c '
              set -e
              
              apk add --no-cache build-base git make
              
              export PS2DEV=/usr/local/ps2dev
              export PS2SDK=$PS2DEV/ps2sdk
              export PATH=$PATH:$PS2DEV/bin:$PS2DEV/ee/bin:$PS2SDK/bin

              # 1. UPDATED BRIDGE HEADER
              cat << "EOF_FIX" > bridge.h
          #ifndef BRIDGE_H
          #define BRIDGE_H
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>

          #include "osdepend.h"
          #include "mame.h"
          #include "common.h"
          #include "driver.h"
          #include "drawgfx.h"

          /* Force declaration of QSound interface if headers hide it */
          struct QSound_interface {
              int clock;
              int mixing_level;
              void *region;
          };
          extern struct QSound_interface qsound_interface;

          /* Other common CPS2 externs that might be hidden by guards */
          extern int cps1_qsound_interrupt(void);
          extern int cps2_vh_start(void);
          extern void cps2_vh_stop(void);
          extern void cps2_vh_screenrefresh(void* bitmap, int full_refresh);

          #define DECL_SPEC
          #endif
          EOF_FIX

              # 2. INJECT INTO CPS2.C
              sed -i "1i #include \"bridge.h\"" src/drivers/cps2.c

              # 3. CONFIGURE THE MAKEFILE
              cat << "EOF_MAKE" > Makefile.ps2
          EE_BIN = AVP.ELF
          EE_OBJS = ps2_main.o src/driver.o src/drivers/cps2.o src/drivers/capcom.o \
                    src/vidhrdw/capcom.o src/sndhrdw/capcom.o \
                    src/libretro/libretro-common/libco/libco.o

          EE_INCS += -I. -Isrc -Isrc/includes -Isrc/ps2 -Isrc/libretro \
                     -Isrc/libretro/libretro-common/include \
                     -Isrc/sndhrdw -Isrc/vidhrdw -Isrc/cpu/m68000 \
                     -Isrc/cpu/z80 -Isrc/sound -Isrc/drivers
          
          # Added -DHAS_QSOUND to try and trigger the original header definitions
          EE_CFLAGS += -D_PS2 -DCPS2 -DLSB_FIRST -D__linux__ -DHAS_QSOUND=1 \
                       -fpermissive -fno-strict-aliasing -fno-common \
                       -Wno-implicit-function-declaration -Wno-implicit-int \
                       -Wno-unused-variable -Wno-return-type
          
          EE_LIBS = -lpatches -ldebug -lstdc++ -lm -lc -lkernel

          include $(PS2SDK)/samples/Makefile.pref
          include $(PS2SDK)/samples/Makefile.eeglobal

          src/libretro/libretro-common/libco/libco.o: src/libretro/libretro-common/libco/libco.c
          	$(EE_CC) $(EE_CFLAGS) $(EE_INCS) -c $< -o $@
          EOF_MAKE

          printf "#include <stdio.h>\nint main() { return 0; }\n" > ps2_main.c

          echo "--- STARTING BUILD ---"
          make -f Makefile.ps2 -j1
            '
