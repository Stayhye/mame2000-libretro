name: Build MAME 2000 AvP (PS2)

on:
  push:
    branches: [ master, main ]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build AVP ELF
        run: |
          docker run --rm \
            -v $(pwd):/src \
            -w /src \
            ps2dev/ps2dev:latest \
            sh -c '
              set -e
              
              apk add --no-cache build-base git make
              
              export PS2DEV=/usr/local/ps2dev
              export PS2SDK=$PS2DEV/ps2sdk
              export PATH=$PATH:$PS2DEV/bin:$PS2DEV/ee/bin:$PS2SDK/bin

              cat << "EOF_MAKE" > /src/Makefile.ps2
          EE_BIN = AVP.ELF
          EE_OBJS = ps2_main.o src/driver.o src/drivers/cps2.o src/drivers/capcom.o src/vidhrdw/capcom.o src/sndhrdw/capcom.o src/libretro/libretro-common/libco/libco.o

          EE_INCS += -Isrc -Isrc/includes -Isrc/ps2 -Isrc/libretro -Isrc/libretro/libretro-common/include \
                     -Isrc/sndhrdw -Isrc/vidhrdw -Isrc/cpu/m68000 -Isrc/cpu/z80
          
          # -fpermissive allows the build to bypass "non-void function" errors
          EE_CFLAGS += -D_PS2 -DCPS2 -DLSB_FIRST -DDECL_SPEC= \
                       -fpermissive -fno-strict-aliasing \
                       -Wno-implicit-int -Wno-unused-variable \
                       -Wno-return-type -Wno-error=implicit-function-declaration
          
          EE_LIBS = -lpatches -ldebug -lstdc++ -lm -lc -lkernel

          include $(PS2SDK)/samples/Makefile.pref
          include $(PS2SDK)/samples/Makefile.eeglobal

          src/libretro/libretro-common/libco/libco.o: src/libretro/libretro-common/libco/libco.c
          	$(EE_CC) $(EE_CFLAGS) $(EE_INCS) -c $< -o $@
          EOF_MAKE

          # Generate stubs
          printf "#include \"driver.h\"\nextern struct GameDriver driver_avp;\nconst struct GameDriver *drivers[] = { &driver_avp, 0 };\n" > /src/src/driver.c
          printf "#include <stdio.h>\n#include <stddef.h>\n#include <stdbool.h>\nsize_t spriteram_size = 0, spriteram_2_size = 0;\nunsigned char *spriteram = NULL, *buffered_spriteram = NULL, *spriteram_2 = NULL, *buffered_spriteram_2 = NULL, *CinemaVectorData = NULL;\nfloat vector_get_intensity(void) { return 1.0f; }\nvoid vector_set_intensity(float i) { }\nvoid path_basedir(char *p) { if(p) p[0] = 0; }\nbool path_mkdir(const char *d) { return true; }\nextern int run_game(int i); \nint main(int c, char **v) { return run_game(0); }\n" > /src/ps2_main.c

          mkdir -p /src/src/libretro/libretro-common/libco
          printf "#include <setjmp.h>\n#include <stdlib.h>\n#include \"libco.h\"\ntypedef struct { jmp_buf context; } sjlj_thread_t;\nstatic sjlj_thread_t *co_running = NULL;\ncothread_t co_active(void) { if(!co_running) { static sjlj_thread_t m; co_running = &m; } return (cothread_t)co_running; }\ncothread_t co_create(unsigned int s, void (*e)(void)) { return (cothread_t)malloc(sizeof(sjlj_thread_t)); }\nvoid co_delete(cothread_t c) { free(c); }\nvoid co_switch(cothread_t n) { sjlj_thread_t *next = (sjlj_thread_t*)n; sjlj_thread_t *prev = co_running; co_running = next; if(!setjmp(prev->context)) longjmp(next->context, 1); }\n" > /src/src/libretro/libretro-common/libco/libco.c

          echo "--- STARTING BUILD ---"
          make -f /src/Makefile.ps2 -j$(nproc)

          echo "--- SUCCESS ---"
          ls -lh /src/AVP.ELF
            '

      - name: Upload ELF
        uses: actions/upload-artifact@v4
        with:
          name: avp-ps2-elf
          path: AVP.ELF
