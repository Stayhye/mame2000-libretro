name: Build MAME 2000 AvP ELF

on:
  push:
    branches: [ master, main ]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile and Link ELF
        run: |
          docker run --rm \
            -v $(pwd):/src \
            -w /src \
            ps2dev/ps2dev:latest \
            /bin/bash -c "
              set -e

              # 1. TOOLCHAIN SETUP
              apk add --no-cache build-base git make
              export PS2DEV=/usr/local/ps2dev
              export PS2SDK=\$PS2DEV/ps2sdk
              export PATH=\$PATH:\$PS2DEV/bin:\$PS2DEV/ee/bin:\$PS2SDK/bin
              
              ln -sf \$PS2DEV/ee/bin/mips64r5900el-ps2-elf-gcc /usr/local/bin/ee-gcc
              ln -sf \$PS2DEV/ee/bin/mips64r5900el-ps2-elf-g++ /usr/local/bin/ee-g++
              ln -sf \$PS2DEV/ee/bin/mips64r5900el-ps2-elf-ar /usr/local/bin/ee-ar

              # 2. ADAPTIVE DISCOVERY & BACKUP
              # Find the real files before ghosting wipes them
              CPS2_REAL=\$(find src -name 'cps2.c' | head -n 1)
              CAPCOM_REAL=\$(find src -name 'capcom.c' | head -n 1)
              
              cp \"\$CPS2_REAL\" /tmp/cps2_backup.c
              cp \"\$CAPCOM_REAL\" /tmp/capcom_backup.c
              
              # 3. GHOSTING
              # Wipe other drivers to ensure the ELF stays within memory limits
              echo 'void ghost_stub(void) {}' > /tmp/ghost.c
              for d in \$(find src -type d -name 'drivers' -o -name 'vidhrdw' -o -name 'sndhrdw'); do
                find \"\$d\" -name '*.c' -exec cp /tmp/ghost.c {} \;
              done

              # Restore the real hardware files
              cp /tmp/cps2_backup.c \"\$CPS2_REAL\"
              cp /tmp/capcom_backup.c \"\$CAPCOM_REAL\"
              
              # 4. DRIVER LIST (AVP ONLY)
              printf '#include \"driver.h\"\nextern struct GameDriver driver_avp;\nconst struct GameDriver *drivers[] = { &driver_avp, 0 };\n' > src/driver.c

              # 5. GLUE CODE & STUBS
              # Added missing spriteram_2_size and vector stubs
              echo '
              #include <stdio.h>
              #include <stddef.h>
              #include <stdbool.h>
              size_t spriteram_size = 0, spriteram_2_size = 0;
              unsigned char *spriteram = NULL, *buffered_spriteram = NULL, *spriteram_2 = NULL, *buffered_spriteram_2 = NULL, *CinemaVectorData = NULL;
              float vector_get_intensity(void) { return 1.0f; }
              void vector_set_intensity(float i) { }
              void path_basedir(char *p) { if(p) p[0] = 0; }
              bool path_mkdir(const char *d) { return true; }
              extern int run_game(int game_index); 
              int main(int argc, char *argv[]) { return run_game(0); }' > ps2_main.c

              # 6. BUILD ARCHIVE
              make platform=ps2 clean
              make platform=ps2 CC='ee-gcc -fno-lto' AR=ee-ar -j\$(nproc)

              # 7. FORCE COMPILE HARDWARE
              INC=\"-Isrc -Isrc/includes -Isrc/ps2 -Isrc/libretro -Isrc/libretro/libretro-common/include\"
              ee-gcc -fno-lto -c ps2_main.c -o ps2_main.o \$INC
              ee-gcc -fno-lto -c \"\$CPS2_REAL\" -o cps2.o \$INC -DCPS2
              ee-gcc -fno-lto -c \"\$CAPCOM_REAL\" -o capcom.o \$INC -DCPS2

              # 8. FINAL LINK
              CRT0=\$(find \$PS2DEV -name 'crt0.o' | head -n 1)
              LNK=\$(find \$PS2DEV -name 'linkfile' | head -n 1)
              
              echo '--- LINKING AVP.ELF ---'
              ee-gcc -fno-lto -T\"\$LNK\" \
                -L\"\$PS2SDK/ee/
