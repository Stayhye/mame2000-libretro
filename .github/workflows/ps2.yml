name: Build MAME 2000 PS2

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Build MAME 2000
        run: |
          docker run --rm \
            -v $(pwd):/src \
            -w /src \
            --env PS2DEV=/usr/local/ps2dev \
            --env PS2SDK=/usr/local/ps2dev/ps2sdk \
            --env PATH="/usr/local/ps2dev/bin:/usr/local/ps2dev/ee/bin:/usr/local/ps2dev/iop/bin:/usr/local/ps2dev/ps2sdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
            ps2dev/ps2dev:latest \
            sh -c "
              apk add --no-cache build-base git && \
              git config --global --add safe.directory /src && \
              ls -l /usr/local/ps2dev/ee/bin/ee-gcc && \
              make platform=ps2 -j\$(nproc)
            "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mame2000_ps2_elf
          path: "*.elf"
