      - name: Checkout Code
        uses: actions/checkout@v4name: Build MAME 2000 PS2 (AvP Targeted)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build MAME 2000
        run: |
          docker run --rm \
            -v $(pwd):/src \
            -w /src \
            ps2dev/ps2dev:latest \
            sh -c "
              set -e

              # 1. TOOLCHAIN SETUP
              apk add --no-cache build-base git
              export EE_BIN_PATH=\$(find /usr/local/ps2dev/ee -name 'mips64r5900el-ps2-elf-gcc' -exec dirname {} \;)
              ln -sf \$EE_BIN_PATH/mips64r5900el-ps2-elf-gcc /usr/local/bin/ee-gcc
              ln -sf \$EE_BIN_PATH/mips64r5900el-ps2-elf-g++ /usr/local/bin/ee-g++
              ln -sf \$EE_BIN_PATH/mips64r5900el-ps2-elf-ar /usr/local/bin/ee-ar
              export PS2DEV=/usr/local/ps2dev
              export PS2SDK=\$PS2DEV/ps2sdk
              export PATH=/usr/local/bin:\$PATH:\$PS2DEV/bin:\$PS2SDK/bin

              # 2. LIBCO PS2 PATCH
              SJLJ_PATH='src/libretro/libretro-common/libco/sjlj.c'
              mkdir -p \$(dirname \$SJLJ_PATH)
              printf '#include <setjmp.h>\n#include <stdlib.h>\n#include \"libco.h\"\ntypedef struct { jmp_buf context; } sjlj_thread_t;\nstatic sjlj_thread_t *co_running = NULL;\ncothread_t co_active(void) { if(!co_running) { static sjlj_thread_t main; co_running = &main; } return (cothread_t)co_running; }\ncothread_t co_create(unsigned int s, void (*e)(void)) { return (cothread_t)malloc(sizeof(sjlj_thread_t)); }\nvoid co_delete(cothread_t c) { free(c); }\nvoid co_switch(cothread_t n) { sjlj_thread_t *next = (sjlj_thread_t*)n; sjlj_thread_t *prev = co_running; co_running = next; if(!setjmp(prev->context)) longjmp(next->context, 1); }' > \$SJLJ_PATH

              # 3. STRIP MAME DRIVERS (The Memory-Saver)
              # Overwrite the master driver list
              echo '#include \"driver.h\"' > src/drivers.c
              echo 'extern struct GameDriver driver_avp;' >> src/drivers.c
              echo 'const struct GameDriver *drivers[] = { &driver_avp, 0 };' >> src/drivers.c

              # Find and empty out the modular driver makefiles
              # This stops the 16MB bloat by forcing the driver list to only CPS2
              find . -name \"*.mak\" -exec sed -i 's/^DRV =.*/DRV =/' {} +
              find . -name \"Makefile*\" -exec sed -i 's/^DRV =.*/DRV =/' {} +
              
              # Explicitly set the only driver we want
              # We use an environment variable that MAME's Makefile often respects
              export DRV=\"\$(OBJ)/drivers/cps2.o\"

              # 4. CLEAN & COMPILE
              make platform=ps2 clean
              echo '--- STARTING TARGETED COMPILE ---'
              # We pass DRV directly into the make command as a final override
              make platform=ps2 DRV=\"\$(OBJ)/drivers/cps2.o\" -j\$(nproc)

              # 5. DIAGNOSTICS & RETRIEVAL
              echo '--- FINAL BUILD SIZE ---'
              ls -lh mame2000_libretro_ps2.a || echo 'Build failed to produce .a'
            "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mame2000-avp-core
          path: mame2000_libretro_ps2.a
        with:
          submodules: recursive

      - name: Build MAME 2000
        run: |
          docker run --rm \
            -v $(pwd):/src \
            -w /src \
            ps2dev/ps2dev:latest \
            sh -c "
              set -e

              # 1. TOOLCHAIN SETUP
              apk add --no-cache build-base git
              export EE_BIN_PATH=\$(find /usr/local/ps2dev/ee -name 'mips64r5900el-ps2-elf-gcc' -exec dirname {} \;)
              ln -sf \$EE_BIN_PATH/mips64r5900el-ps2-elf-gcc /usr/local/bin/ee-gcc
              ln -sf \$EE_BIN_PATH/mips64r5900el-ps2-elf-g++ /usr/local/bin/ee-g++
              ln -sf \$EE_BIN_PATH/mips64r5900el-ps2-elf-ar /usr/local/bin/ee-ar
              export PS2DEV=/usr/local/ps2dev
              export PS2SDK=\$PS2DEV/ps2sdk
              export PATH=/usr/local/bin:\$PATH:\$PS2DEV/bin:\$PS2SDK/bin

              # 2. LIBCO PS2 PATCH
              SJLJ_PATH='src/libretro/libretro-common/libco/sjlj.c'
              mkdir -p \$(dirname \$SJLJ_PATH)
              printf '#include <setjmp.h>\n#include <stdlib.h>\n#include \"libco.h\"\ntypedef struct { jmp_buf context; } sjlj_thread_t;\nstatic sjlj_thread_t *co_running = NULL;\ncothread_t co_active(void) { if(!co_running) { static sjlj_thread_t main; co_running = &main; } return (cothread_t)co_running; }\ncothread_t co_create(unsigned int s, void (*e)(void)) { return (cothread_t)malloc(sizeof(sjlj_thread_t)); }\nvoid co_delete(cothread_t c) { free(c); }\nvoid co_switch(cothread_t n) { sjlj_thread_t *
