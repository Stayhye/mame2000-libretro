name: Build MAME 2000 AvP ELF

on:
  push:
    branches: [ master, main ]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile and Link ELF
        run: |
          docker run --rm \
            -v $(pwd):/src \
            -w /src \
            ps2dev/ps2dev:latest \
            sh -c "
              set -e

              # 1. SETUP TOOLS
              apk add --no-cache build-base git make
              export PS2DEV=/usr/local/ps2dev
              export PS2SDK=\$PS2DEV/ps2sdk
              export PATH=\$PATH:\$PS2DEV/bin:\$PS2DEV/ee/bin:\$PS2SDK/bin
              
              ln -sf \$PS2DEV/ee/bin/mips64r5900el-ps2-elf-gcc /usr/local/bin/ee-gcc
              ln -sf \$PS2DEV/ee/bin/mips64r5900el-ps2-elf-g++ /usr/local/bin/ee-g++
              ln -sf \$PS2DEV/ee/bin/mips64r5900el-ps2-elf-ar /usr/local/bin/ee-ar

              # 2. DISCOVER PATHS
              # We find these now so we can use them for manual compilation later
              CPS2_SOURCE=\$(find src -name 'cps2.c' | head -n 1)
              CAPCOM_SOURCE=\$(find src -name 'capcom.c' | head -n 1)
              COMMON_SOURCE=\$(find src -name 'common.c' | grep 'capcom' | head -n 1)

              # 3. SELECTIVE GHOSTING
              # Wipe all drivers except the ones we found above
              echo 'void ghost_stub(void) {}' > /tmp/ghost.c
              for d in \$(find src -type d -name 'drivers' -o -name 'vidhrdw' -o -name 'sndhrdw'); do
                find \"\$d\" -name '*.c' \
                  ! -path \"*\$CPS2_SOURCE\" \
                  ! -path \"*\$CAPCOM_SOURCE\" \
                  ! -path \"*\$COMMON_SOURCE\" \
                  -exec cp /tmp/ghost.c {} \;
              done
              
              # 4. OVERWRITE THE DRIVER LIST
              printf '#include \"driver.h\"\nextern struct GameDriver driver_avp;\nconst struct GameDriver *drivers[] = { &driver_avp, 0 };\n' > src/driver.c

              # 5. GENERATE GLUE FILE
              echo '
              #include <stdio.h>
              #include <stddef.h>
              #include <stdbool.h>
              size_t spriteram_size = 0, spriteram_2_size = 0;
              unsigned char *spriteram = NULL, *buffered_spriteram = NULL, *spriteram_2 = NULL, *buffered_spriteram_2 = NULL, *CinemaVectorData = NULL;
              float vector_get_intensity(void) { return 1.0f; }
              void vector_set_intensity(float i) { }
              void path_basedir(char *path) { if (path) path[0] = 0; }
              bool path_mkdir(const char *dir) { return true; }
              extern int run_game(int game_index); 
              int main(int argc, char *argv[]) { return run_game(0); }' > ps2_main.c

              # 6. BUILD THE STATIC ARCHIVE
              make platform=ps2 clean
              make platform=ps2 CC='ee-gcc -fno-lto -DCPS2' AR=ee-ar -j\$(nproc)
