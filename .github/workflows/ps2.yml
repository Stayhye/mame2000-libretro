name: Build MAME 2000 PS2

on: [push, pull_request]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # This ensures the .git folder is actually present
          fetch-depth: 0
          submodules: recursive

      - name: Install Dependencies
        run: |
          apk add build-base git
          # Tell git that this directory is safe, even if owned by a different user
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Compile
        run: |
          # Use the environment's processors to speed up build
          make platform=ps2 -j$(nproc)

      - name: Upload ELF
        uses: actions/upload-artifact@v4
        with:
          name: mame2000_ps2_elf
          path: "*.elf"
