name: Build MAME 2000 PS2

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Build MAME 2000
        run: |
          docker run --rm \
            -v $(pwd):/src \
            -w /src \
            ps2dev/ps2dev:latest \
            sh -c "
              # 1. PREREQUISITES & ENVIRONMENT
              apk add --no-cache build-base git && \
              git config --global --add safe.directory /src && \
              
              export EE_BIN_PATH=\$(find /usr/local/ps2dev/ee -name 'mips64r5900el-ps2-elf-gcc' -exec dirname {} \;) && \
              ln -sf \$EE_BIN_PATH/mips64r5900el-ps2-elf-gcc /usr/local/bin/ee-gcc && \
              ln -sf \$EE_BIN_PATH/mips64r5900el-ps2-elf-g++ /usr/local/bin/ee-g++ && \
              ln -sf \$EE_BIN_PATH/mips64r5900el-ps2-elf-ar /usr/local/bin/ee-ar && \
              
              export PS2DEV=/usr/local/ps2dev && \
              export PS2SDK=\$PS2DEV/ps2sdk && \
              export PATH=/usr/local/bin:\$PATH:\$PS2DEV/bin:\$PS2SDK/bin && \
              
              # 2. THE CLEAN SLATE OVERRIDE
              # We create a new, minimal libco/sjlj implementation for PS2
              SJLJ_PATH='src/libretro/libretro-common/libco/sjlj.c'
              cat <<EOF > \$SJLJ_PATH
              #include <setjmp.h>
              #include <stdlib.h>
              #include \"libco.h\"

              typedef struct {
                 jmp_buf context;
              } sjlj_thread_t;

              static thread_local sjlj_thread_t *co_running;

              cothread_t co_active(void) {
                 if(!co_running) {
                    static sjlj_thread_t main_thread;
                    co_running = &main_thread;
                 }
                 return (cothread_t)co_running;
              }

              cothread_t co_create(unsigned int size, void (*entrypoint)(void)) {
                 sjlj_thread_t *thread = (sjlj_thread_t*)malloc(sizeof(sjlj_thread_t));
                 if(thread) {
                    if(!setjmp(thread->context)) {
                       /* PS2 doesn't need the complex signal stack dance */
                    }
                 }
                 return (cothread_t)thread;
              }

              void co_delete(cothread_t cothread) {
                 free(cothread);
              }

              void co_switch(cothread_t cothread) {
                 sjlj_thread_t *next = (sjlj_thread_t*)cothread;
                 sjlj_thread_t *prev = co_running;
                 co_running = next;
                 if(!setjmp(prev->context)) {
                    longjmp(next->context, 1);
                 }
              }
              EOF

              # 3. COMPILATION
              make platform=ps2 clean && \
              make platform=ps2 -j\$(nproc)
            "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mame2000_ps2_elf
          path: |
            *.elf
            *.a
