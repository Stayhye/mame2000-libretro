name: Build MAME 2000 AvP ELF

on:
  push:
    branches: [ master, main ]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile and Link ELF
        run: |
          docker run --rm \
            -v $(pwd):/src \
            -w /src \
            ps2dev/ps2dev:latest \
            sh -c "
              set -e

              # 1. INSTALL TOOLS
              apk add --no-cache build-base git make

              # 2. TOOLCHAIN & PATHS
              export PS2DEV=/usr/local/ps2dev
              export PS2SDK=\$PS2DEV/ps2sdk
              export PATH=\$PATH:\$PS2DEV/bin:\$PS2DEV/ee/bin:\$PS2SDK/bin
              
              ln -sf \$PS2DEV/ee/bin/mips64r5900el-ps2-elf-gcc /usr/local/bin/ee-gcc
              ln -sf \$PS2DEV/ee/bin/mips64r5900el-ps2-elf-g++ /usr/local/bin/ee-g++
              ln -sf \$PS2DEV/ee/bin/mips64r5900el-ps2-elf-ar /usr/local/bin/ee-ar

              # 3. SELECTIVE GHOSTING
              # We ghost everything EXCEPT the core Capcom/CPS2 files
              echo 'void ghost_stub(void) {}' > /tmp/ghost.c
              for d in \$(find src -type d -name 'drivers' -o -name 'vidhrdw' -o -name 'sndhrdw'); do
                find \"\$d\" -name '*.c' \
                  ! -name 'cps2.c' \
                  ! -name 'capcom.c' \
                  ! -name 'common.c' \
                  -exec cp /tmp/ghost.c {} \;
              done
              
              # 4. OVERWRITE THE DRIVER LIST
              printf '#include \"driver.h\"\nextern struct GameDriver driver_avp;\nconst struct GameDriver *drivers[] = { &driver_avp, 0 };\n' > src/driver.c

              # 5. FIX LIBCO
              CO_DIR='src/libretro/libretro-common/libco'
              mkdir -p \$CO_DIR
              printf '#include <setjmp.h>\n#include <stdlib.h>\n#include \"libco.h\"\ntypedef struct { jmp_buf context; } sjlj_thread_t;\nstatic sjlj_thread_t *co_running = NULL;\ncothread_t co_active(void) { if(!co_running) { static sjlj_thread_t m; co_running = &m; } return (cothread_t)co_running; }\ncothread_t co_create(unsigned int s, void (*e)(void)) { return (cothread_t)malloc(sizeof(sjlj_thread_t)); }\nvoid co_delete(cothread_t c) { free(c); }\nvoid co_switch(cothread_t n) { sjlj_thread_t *next = (sjlj_thread_t*)n; sjlj_thread_t *prev = co_running; co_running = next; if(!setjmp(prev->context)) longjmp(next->context, 1); }' > \$CO_DIR/sjlj.c
              cp \$CO_DIR/sjlj.c \$CO_DIR/libco.c

              # 6. COMPREHENSIVE GLUE FILE
              echo '
              #include <stdio.h>
              #include <stddef.h>
              #include <stdbool.h>
              size_t spriteram_size = 0;
              size_t spriteram_2_size = 0;
              unsigned char *spriteram = NULL;
              unsigned char *buffered_spriteram = NULL;
              unsigned char *spriteram_2 = NULL;
              unsigned char *buffered_spriteram_2 = NULL;
              unsigned char *CinemaVectorData = NULL;
              float vector_get_intensity(void) { return 1.0f; }
              void vector_set_intensity(float i) { }
              void path_basedir(char *path) { if (path) path[0] = 0; }
              bool path_mkdir(const char *dir) { return true; }
              extern int run_game(int game_index); 
              int main(int argc, char *argv[]) {
                  return run_game(0); 
              }' > ps2_main.c

              # 7. BUILD
              make platform=ps2 clean
              # Explicitly define CPS2 to ensure the driver is compiled in
              make platform=ps2 CC='ee-gcc -fno-lto -DCPS2' AR=ee-ar -j\$(nproc)
              
              # Compile our glue
              ee-gcc -fno-lto -c ps2_main.c -o ps2_main.o -Isrc -Isrc/ps2 -Isrc/libretro/libretro-common/include

              # 8. FINAL LINK (Explicitly adding the CPS2 object just in case)
              REAL_CRT0=\$(find \$PS2DEV -name 'crt0.o' | head -n 1)
              REAL_LINKFILE=\$(find \$PS2DEV -name 'linkfile' | head -n 1)
              CPS2_OBJ=\$(find obj -name 'cps2.o' | head -n 1)

              echo '--- LINKING AVP.ELF ---'
              ee-gcc -fno-lto -T\"\$REAL_LINKFILE\" \
                -L\"\$PS2SDK/ee/lib\" \
                -L\$(dirname \"\$REAL_CRT0\") \
                -o AVP.ELF \
                \"\$REAL_CRT0\" \
                ps2_main.o \
                \"\$CPS2_OBJ\" \
                mame2000_libretro_ps2.a \
                -lpatches -ldebug -lstdc++ -lc -lm -lkernel -Wl,-z,muldefs
              
              echo '--- SUCCESS ---'
              ls -lh AVP.ELF
            "

      - name: Upload ELF
        uses: actions/upload-artifact@v4
        with:
          name: avp-ps2-elf
          path: AVP.ELF
