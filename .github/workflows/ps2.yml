name: Build MAME 2000 PS2

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Build MAME 2000
        run: |
          docker run --rm \
            -v $(pwd):/src \
            -w /src \
            ps2dev/ps2dev:latest \
            sh -c "
              # 1. TOOLCHAIN SETUP
              apk add --no-cache build-base git && \
              git config --global --add safe.directory /src && \
              export EE_BIN_PATH=\$(find /usr/local/ps2dev/ee -name 'mips64r5900el-ps2-elf-gcc' -exec dirname {} \;) && \
              ln -sf \$EE_BIN_PATH/mips64r5900el-ps2-elf-gcc /usr/local/bin/ee-gcc && \
              ln -sf \$EE_BIN_PATH/mips64r5900el-ps2-elf-g++ /usr/local/bin/ee-g++ && \
              ln -sf \$EE_BIN_PATH/mips64r5900el-ps2-elf-ar /usr/local/bin/ee-ar && \
              export PS2DEV=/usr/local/ps2dev && \
              export PS2SDK=\$PS2DEV/ps2sdk && \
              export PATH=/usr/local/bin:\$PATH:\$PS2DEV/bin:\$PS2SDK/bin && \
              
              # 2. LIBCO OVERRIDE
              SJLJ_PATH='src/libretro/libretro-common/libco/sjlj.c'
              mkdir -p \$(dirname \$SJLJ_PATH)
              cat <<EOF > \$SJLJ_PATH
              #include <setjmp.h>
              #include <stdlib.h>
              #include \"libco.h\"
              typedef struct { jmp_buf context; } sjlj_thread_t;
              static sjlj_thread_t *co_running = NULL;
              cothread_t co_active(void) {
                 if(!co_running) { static sjlj_thread_t main_thread; co_running = &main_thread; }
                 return (cothread_t)co_running;
              }
              cothread_t co_create(unsigned int size, void (*entrypoint)(void)) {
                 return (cothread_t)malloc(sizeof(sjlj_thread_t));
              }
              void co_delete(cothread_t cothread) { free(cothread); }
              void co_switch(cothread_t cothread) {
                 sjlj_thread_t *next = (sjlj_thread_t*)cothread;
                 sjlj_thread_t *prev = co_running;
                 co_running = next;
                 if(!setjmp(prev->context)) longjmp(next->context, 1);
              }
              EOF

              # 3. THE FORCE BUILD
              # We try common MAME libretro makefile locations if the default fails
              if [ -f Makefile.libretro ]; then
                make -f Makefile.libretro platform=ps2 -j\$(nproc)
              elif [ -f src/libretro/Makefile ]; then
                make -C src/libretro platform=ps2 -j\$(nproc)
              else
                make platform=ps2 -j\$(nproc)
              fi
              
              # 4. DIAGNOSTIC: List everything to see where it went
              echo '--- All Files Created in Build ---'
              find . -maxdepth 3 -name '*.a' -o -name '*.elf'
              
              # Move whatever we found to the root
              find . -name '*.a' -exec cp {} . \;
              find . -name '*.elf' -exec cp {} . \;
            "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mame2000_ps2_binaries
          path: |
             ./*.elf
             ./*.a
