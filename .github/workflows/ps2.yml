name: Build MAME 2000 PS2

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Build MAME 2000
        run: |
          docker run --rm \
            -v $(pwd):/src \
            -w /src \
            ps2dev/ps2dev:latest \
            sh -c "
              # 1. PREREQUISITES & ENVIRONMENT
              apk add --no-cache build-base git && \
              git config --global --add safe.directory /src && \
              
              # Find toolchain and create legacy symlinks
              export EE_BIN_PATH=\$(find /usr/local/ps2dev/ee -name 'mips64r5900el-ps2-elf-gcc' -exec dirname {} \;) && \
              ln -sf \$EE_BIN_PATH/mips64r5900el-ps2-elf-gcc /usr/local/bin/ee-gcc && \
              ln -sf \$EE_BIN_PATH/mips64r5900el-ps2-elf-g++ /usr/local/bin/ee-g++ && \
              ln -sf \$EE_BIN_PATH/mips64r5900el-ps2-elf-ar /usr/local/bin/ee-ar && \
              
              export PS2DEV=/usr/local/ps2dev && \
              export PS2SDK=\$PS2DEV/ps2sdk && \
              export PATH=/usr/local/bin:\$PATH:\$PS2DEV/bin:\$PS2SDK/bin && \
              
              # 2. THE TOTAL REPLACEMENT (No more line-by-line errors)
              SJLJ_PATH='src/libretro/libretro-common/libco/sjlj.c' && \
              
              # Replace signal jumps with standard C jumps globally
              sed -i 's/sigjmp_buf/jmp_buf/g' \$SJLJ_PATH && \
              sed -i 's/sigsetjmp(\([^,]*\), [01])/setjmp(\1)/g' \$SJLJ_PATH && \
              sed -i 's/siglongjmp/longjmp/g' \$SJLJ_PATH && \
              
              # Nuke the entire signal-stack logic block and replace with a simple malloc
              # This covers from the 'stack_t' declaration down to the 'sigaction' call
              # We use a simplified C-style allocation that the PS2 actually supports
              printf \"#define _LIBCO_C\n#include <setjmp.h>\n#include <stdlib.h>\n\" > temp_sjlj.c && \
              cat \$SJLJ_PATH >> temp_sjlj.c && mv temp_sjlj.c \$SJLJ_PATH && \
              
              # This sed finds the block starting with stack_t and ends it before the return
              # It replaces the broken POSIX code with a simple PS2-friendly stack pointer
              sed -i '/stack_t stack;/,/if(!raise(SIGUSR1))/c\      thread->stack = malloc(size);' \$SJLJ_PATH && \

              # 3. COMPILATION
              make platform=ps2 clean && \
              make platform=ps2 -j\$(nproc)
            "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mame2000_ps2_elf
          path: |
            *.elf
            *.a
