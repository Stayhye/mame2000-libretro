name: Build MAME 2000 AvP ISO

on:
  push:
    branches: [ master, main ]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Package ISO
        run: |
          docker run --rm \
            -v $(pwd):/src \
            -w /src \
            ps2dev/ps2dev:latest \
            sh -c "
              set -e

              # 1. SETUP TOOLS & LIBS
              # We need xorriso for ISOs and we must build/install zlib for the EE
              apk add --no-cache build-base git xorriso
              
              # Install Zlib for PS2 (EE)
              git clone https://github.com/ps2dev/ps2sdk-ports.git
              cd ps2sdk-ports/zlib && make && make install && cd ../..

              # 2. TOOLCHAIN PATHS
              export PS2DEV=/usr/local/ps2dev
              export PS2SDK=\$PS2DEV/ps2sdk
              export PATH=\$PATH:\$PS2DEV/bin:\$PS2DEV/ee/bin:\$PS2SDK/bin
              
              # Find the actual location of crt0.o and libs
              CRT0_PATH=\$(find \$PS2SDK -name 'crt0.o' | head -n 1)
              LIB_PATH=\$(dirname \$CRT0_PATH)

              # 3. GHOSTING & LIBCO PATCH (The 5.84MB logic)
              CO_DIR='src/libretro/libretro-common/libco'
              mkdir -p \$CO_DIR
              printf '#include <setjmp.h>\n#include <stdlib.h>\n#include \"libco.h\"\ntypedef struct { jmp_buf context; } sjlj_thread_t;\nstatic sjlj_thread_t *co_running = NULL;\ncothread_t co_active(void) { if(!co_running) { static sjlj_thread_t main_thread; co_running = &main_thread; } return (cothread_t)co_running; }\ncothread_t co_create(unsigned int s, void (*e)(void)) { return (cothread_t)malloc(sizeof(sjlj_thread_t)); }\nvoid co_delete(cothread_t c) { free(c); }\nvoid co_switch(cothread_t n) { sjlj_thread_t *next = (sjlj_thread_t*)n; sjlj_thread_t *prev = co_running; co_running = next; if(!setjmp(prev->context)) longjmp(next->context, 1); }' > \$CO_DIR/sjlj.c
              cp \$CO_DIR/sjlj.c \$CO_DIR/libco.c

              echo 'void ghost_stub(void) {}' > /tmp/ghost.c
              for d in \$(find src -type d -name 'drivers' -o -name 'vidhrdw' -o -name 'sndhrdw'); do
                find \"\$d\" -name '*.c' ! -name 'cps2.c' ! -name 'capcom.c' -exec cp /tmp/ghost.c {} \;
              done
              
              echo '#include \"driver.h\"' > src/drivers.c
              echo 'extern struct GameDriver driver_avp;' >> src/drivers.c
              echo 'const struct GameDriver *drivers[] = { &driver_avp, 0 };' >> src/drivers.c

              # 4. COMPILE CORE
              make platform=ps2 clean
              make platform=ps2 -j\$(nproc)

              # 5. LINKING WITH CORRECT PATHS
              echo '--- LINKING AVP.ELF ---'
              mips64r5900el-ps2-elf-gcc -T\$PS2SDK/ee/startup/linkfile -L\$LIB_PATH -L\$PS2SDK/ee/lib \
                -o AVP.ELF \
                \$CRT0_PATH \
                mame2000_libretro_ps2.a \
                -lpatches -ldebug -lstdc++ -lc -lm -lz -lkernel

              # 6. CREATE ISO
              mkdir -p iso_root/ROMS
              cp AVP.ELF iso_root/
              # NOTE: You should ensure your avp.zip is in the repo to be included here
              [ -f avp.zip ] && cp avp.zip iso_root/ROMS/ || echo 'Warning: avp.zip not found'

              echo \"BOOT2 = cdrom0:\\\AVP.ELF;1\" > iso_root/SYSTEM.CNF
              echo \"VER = 1.00\" >> iso_root/SYSTEM.CNF
              echo \"VMODE = NTSC\" >> iso_root/SYSTEM.CNF

              xorrisofs -o avp_ps2.iso -R -J -V \"AVP_PS2\" ./iso_root
            "

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: avp-ps2-iso
          path: avp_ps2.iso
