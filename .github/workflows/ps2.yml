name: Build MAME 2000 PS2

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Build MAME 2000
        run: |
          docker run --rm \
            -v $(pwd):/src \
            -w /src \
            ps2dev/ps2dev:latest \
            sh -c "
              # 1. Setup tools
              apk add --no-cache build-base git && \
              git config --global --add safe.directory /src && \
              
              # 2. Fix Toolchain paths
              export EE_BIN_PATH=\$(find /usr/local/ps2dev/ee -name 'mips64r5900el-ps2-elf-gcc' -exec dirname {} \;) && \
              ln -sf \$EE_BIN_PATH/mips64r5900el-ps2-elf-gcc /usr/local/bin/ee-gcc && \
              ln -sf \$EE_BIN_PATH/mips64r5900el-ps2-elf-g++ /usr/local/bin/ee-g++ && \
              ln -sf \$EE_BIN_PATH/mips64r5900el-ps2-elf-ar /usr/local/bin/ee-ar && \
              
              # 3. THE FORCE FIX: Patch the source code directly
              # We replace signal-based jumps with standard C jumps in sjlj.c
              sed -i 's/sigjmp_buf/jmp_buf/g' src/libretro/libretro-common/libco/sjlj.c && \
              sed -i 's/sigsetjmp(creating->context, 0)/setjmp(creating->context)/g' src/libretro/libretro-common/libco/sjlj.c && \
              sed -i 's/siglongjmp/longjmp/g' src/libretro/libretro-common/libco/sjlj.c && \
              
              # 4. Set Environment
              export PS2DEV=/usr/local/ps2dev && \
              export PS2SDK=\$PS2DEV/ps2sdk && \
              export PATH=/usr/local/bin:\$PATH:\$PS2DEV/bin:\$PS2SDK/bin && \
              
              # 5. Compile
              make platform=ps2 clean && \
              make platform=ps2 -j\$(nproc)
            "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mame2000_ps2_elf
          path: |
            *.elf
            *.a
