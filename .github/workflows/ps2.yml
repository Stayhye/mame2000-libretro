name: Build MAME 2000 PS2

on:
  push:
    branches: [ master, main ]
  pull_request: 
    branches: [ master, main ]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Build MAME 2000
        run: |
          docker run --rm \
            -v $(pwd):/src \
            -w /src \
            ps2dev/ps2dev:latest \
            sh -c "
              # 1. SETUP
              apk add --no-cache build-base git && \
              git config --global --add safe.directory /src && \
              
              # 2. TOOLCHAIN LINKS
              export EE_BIN_PATH=\$(find /usr/local/ps2dev/ee -name 'mips64r5900el-ps2-elf-gcc' -exec dirname {} \;) && \
              ln -sf \$EE_BIN_PATH/mips64r5900el-ps2-elf-gcc /usr/local/bin/ee-gcc && \
              ln -sf \$EE_BIN_PATH/mips64r5900el-ps2-elf-g++ /usr/local/bin/ee-g++ && \
              ln -sf \$EE_BIN_PATH/mips64r5900el-ps2-elf-ar /usr/local/bin/ee-ar && \
              export PS2DEV=/usr/local/ps2dev && \
              export PS2SDK=\$PS2DEV/ps2sdk && \
              export PATH=/usr/local/bin:\$PATH:\$PS2DEV/bin:\$PS2SDK/bin && \
              
              # 3. OVERWRITE LIBCO (The PS2-Safe Version)
              SJLJ_PATH='src/libretro/libretro-common/libco/sjlj.c' && \
              mkdir -p \$(dirname \$SJLJ_PATH) && \
              echo '#include <setjmp.h>' > \$SJLJ_PATH && \
              echo '#include <stdlib.h>' >> \$SJLJ_PATH && \
              echo '#include \"libco.h\"' >> \$SJLJ_PATH && \
              echo 'typedef struct { jmp_buf context; } sjlj_thread_t;' >> \$SJLJ_PATH && \
              echo 'static sjlj_thread_t *co_running = NULL;' >> \$SJLJ_PATH && \
              echo 'cothread_t co_active(void) { if(!co_running) { static sjlj_thread_t main; co_running = &main; } return (cothread_t)co_running; }' >> \$SJLJ_PATH && \
              echo 'cothread_t co_create(unsigned int s, void (*e)(void)) { return (cothread_t)malloc(sizeof(sjlj_thread_t)); }' >> \$SJLJ_PATH && \
              echo 'void co_delete(cothread_t c) { free(c); }' >> \$SJLJ_PATH && \
              echo 'void co_switch(cothread_t n) { sjlj_thread_t *next = (sjlj_thread_t*)n; sjlj_thread_t *prev = co_running; co_running = next; if(!setjmp(prev->context)) longjmp(next->context, 1); }' >> \$SJLJ_PATH && \

              # 4. START THE ACTUAL BUILD
              # We use '||' to try different common MAME makefile names
              echo '--- Starting Build ---' && \
              (make platform=ps2 -j\$(nproc) || make -f Makefile.libretro platform=ps2 -j\$(nproc) || make -C src/libretro platform=ps2 -j\$(nproc)) && \
              
              # 5. RETRIEVAL
              echo '--- Listing Binaries ---' && \
              find . -name '*.elf' -o -name '*.a' && \
              find . -name '*.elf' -exec cp {} . \; && \
              find . -name '*.a' -exec cp {} . \;
            "

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mame2000_ps2_binaries
          path: |
             ./*.elf
             ./*.a
