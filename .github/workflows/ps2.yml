- name: Build MAME 2000
        run: |
          docker run --rm \
            -v $(pwd):/src \
            -w /src \
            ps2dev/ps2dev:latest \
            sh -c "
              set -e
              # [Toolchain setup code here...]

              # THE FIX: Force the Driver variable to be nearly empty
              # We find the line starting with 'DRV =' and replace it with just one file.
              # We use a very broad regex to catch different spacing styles.
              sed -i 's/^DRV[[:space:]]*=.*/DRV = \$(OBJ)\/drivers\/cps2.o/' Makefile
              
              # If your makefile uses COREDRV instead:
              sed -i 's/^COREDRV[[:space:]]*=.*/COREDRV = \$(OBJ)\/drivers\/cps2.o/' Makefile

              # Also, MAME 2000 often has 'CPU' and 'SOUND' variables. 
              # To save more RAM, we can limit these to only what AvP needs (68000, Z80, QSound).
              # But let's start with just the drivers first.

              make platform=ps2 clean
              make platform=ps2 -j\$(nproc)
              
              ls -lh mame2000_libretro_ps2.a
            "
