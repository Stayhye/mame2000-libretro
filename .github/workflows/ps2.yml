name: Build MAME 2000 AvP ELF

on:
  push:
    branches: [ master, main ]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Build Script
        run: |
          cat <<'MAIN_SCRIPT_FINISH' > build_ps2.sh
          set -e

          # 1. SETUP ENVIRONMENT
          apk add --no-cache build-base git make
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export PATH=$PATH:$PS2DEV/bin:$PS2DEV/ee/bin:$PS2SDK/bin
          
          ln -sf $PS2DEV/ee/bin/mips64r5900el-ps2-elf-gcc /usr/local/bin/ee-gcc
          ln -sf $PS2DEV/ee/bin/mips64r5900el-ps2-elf-g++ /usr/local/bin/ee-g++
          ln -sf $PS2DEV/ee/bin/mips64r5900el-ps2-elf-ar /usr/local/bin/ee-ar

          # 2. PROTECT CPS2 HARDWARE
          CPS2_C=$(find src -name 'cps2.c' | head -n 1)
          CAPCOM_C=$(find src -name 'capcom.c' | head -n 1)
          cp "$CPS2_C" /tmp/cps2_real.c
          cp "$CAPCOM_C" /tmp/capcom_real.c
          
          # 3. GHOSTING
          echo 'void ghost_stub(void) {}' > /tmp/ghost.c
          for d in $(find src -type d -name 'drivers' -o -name 'vidhrdw' -o -name 'sndhrdw'); do
            find "$d" -name '*.c' -exec cp /tmp/ghost.c {} \;
          done

          # Restore AvP hardware
          cp /tmp/cps2_real.c "$CPS2_C"
          cp /tmp/capcom_real.c "$CAPCOM_C"
          
          # 4. OVERWRITE DRIVER LIST
          echo '#include "driver.h"' > src/driver.c
          echo 'extern struct GameDriver driver_avp;' >> src/driver.c
          echo 'const struct GameDriver *drivers[] = { &driver_avp, 0 };' >> src/driver.c

          # 5. FIX LIBCO
          CO_DIR='src/libretro/libretro-common/libco'
          mkdir -p $CO_DIR
          cat <<'LIBCO_EOF' > $CO_DIR/sjlj.c
          #include <setjmp.h>
          #include <stdlib.h>
          #include "libco.h"
          typedef struct { jmp_buf context; } sjlj_thread_t;
          static sjlj_thread_t *co_running = NULL;
          cothread_t co_active(void) { if(!co_running) { static sjlj_thread_t m; co_running = &m; } return (cothread_t)co_running; }
          cothread_t co_create(unsigned int s, void (*e)(void)) { return (cothread_t)malloc(sizeof(sjlj_thread_t)); }
          void co_delete(cothread_t c) { free(c); }
          void co_switch(cothread_t n) { sjlj_thread_t *next = (sjlj_thread_t*)n; sjlj_thread_t *prev = co_running; co_running = next; if(!setjmp(prev->context)) longjmp(next->context, 1); }
          LIBCO_EOF
          cp $CO_DIR/sjlj.c $CO_DIR/libco.c

          # 6. GLUE FILE
          cat <<'GLUE_EOF' > ps2_main.c
          #include <stdio.h>
          #include <stddef.h>
          #include <stdbool.h>
          size_t spriteram_size = 0, spriteram_2_size = 0;
          unsigned char *spriteram = NULL, *buffered_spriteram = NULL, *spriteram_2 = NULL, *buffered_spriteram_2 = NULL, *CinemaVectorData = NULL;
          float vector_get_intensity(void) { return 1.0f; }
          void vector_set_intensity(float i) { }
          void path_basedir(char *path) { if (path) path[0] = '\0'; }
          bool path_mkdir(const char *dir) { return true; }
          extern int run_game(int game_index); 
          int main(int argc, char *argv[]) { return run_game(0); }
          GLUE_EOF

          # 7. BUILD CORE
          make platform=ps2 clean
          make platform=ps2 CC='ee-gcc -fno-lto' AR=ee-ar -j$(nproc)

          # 8. MANUAL COMPILE & LINK
          INC="-Isrc -Isrc/includes -Isrc/ps2 -Isrc/libretro -Isrc/libretro/libretro-common/include"
          ee-gcc -fno-lto -c ps2_main
