name: Build MAME 2000 PS2

on: [push, pull_request]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    # We move the container definition down to the step level 
    # to avoid the "missing git" trap during initial checkout.
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Build inside ps2dev container
        run: |
          docker run --rm -v $(pwd):/src -w /src ps2dev/ps2dev:latest \
          sh -c "apk add build-base git && \
                 git config --global --add safe.directory /src && \
                 make platform=ps2 -j$(nproc)"
                 
      - name: Upload ELF
        uses: actions/upload-artifact@v4
        with:
          name: mame2000_ps2_elf
          path: "*.elf"
