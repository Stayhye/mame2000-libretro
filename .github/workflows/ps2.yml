name: Build MAME 2000 AvP ELF

on:
  push:
    branches: [ master, main ]

jobs:
  build-ps2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile and Link ELF
        run: |
          docker run --rm \
            -v $(pwd):/src \
            -w /src \
            ps2dev/ps2dev:latest \
            sh -c "
              set -e

              # 1. INSTALL ESSENTIAL BUILD TOOLS
              # We must explicitly add 'make' here
              apk add --no-cache build-base git make

              # 2. TOOLCHAIN ALIASING
              export PS2DEV=/usr/local/ps2dev
              export PS2SDK=\$PS2DEV/ps2sdk
              export PATH=\$PATH:\$PS2DEV/bin:\$PS2DEV/ee/bin:\$PS2SDK/bin
              
              ln -sf /usr/local/ps2dev/ee/bin/mips64r5900el-ps2-elf-gcc /usr/local/bin/ee-gcc
              ln -sf /usr/local/ps2dev/ee/bin/mips64r5900el-ps2-elf-g++ /usr/local/bin/ee-g++
              ln -sf /usr/local/ps2dev/ee/bin/mips64r5900el-ps2-elf-ar /usr/local/bin/ee-ar

              # 3. GHOSTING DRIVERS (Maintaining the 5.84MB size)
              echo 'void ghost_stub(void) {}' > /tmp/ghost.c
              for d in \$(find src -type d -name 'drivers' -o -name 'vidhrdw' -o -name 'sndhrdw'); do
                find \"\$d\" -name '*.c' ! -name 'cps2.c' ! -name 'capcom.c' -exec cp /tmp/ghost.c {} \;
              done
              
              echo '#include \"driver.h\"' > src/drivers.c
              echo 'extern struct GameDriver driver_avp;' >> src/drivers.c
              echo 'const struct GameDriver *drivers[] = { &driver_avp, 0 };' >> src/drivers.c

              # 4. FIX LIBCO
              CO_DIR='src/libretro/libretro-common/libco'
              mkdir -p \$CO_DIR
              printf '#include <setjmp.h>\n#include <stdlib.h>\n#include \"libco.h\"\ntypedef struct { jmp_buf context; } sjlj_thread_t;\nstatic sjlj_thread_t *co_running = NULL;\ncothread_t co_active(void) { if(!co_running) { static sjlj_thread_t m; co_running = &m; } return (cothread_t)co_running; }\ncothread_t co_create(unsigned int s, void (*e)(void)) { return (cothread_t)malloc(sizeof(sjlj_thread_t)); }\nvoid co_delete(cothread_t c) { free(c); }\nvoid co_switch(cothread_t n) { sjlj_thread_t *next = (sjlj_thread_t*)n; sjlj_thread_t *prev = co_running; co_running = next; if(!setjmp(prev->context)) longjmp(next->context, 1); }' > \$CO_DIR/sjlj.c
              cp \$CO_DIR/sjlj.c \$CO_DIR/libco.c

              # 5. COMPILE CORE
              # Using the aliases we created above
              make platform=ps2 clean
              make platform=ps2 CC=ee-gcc AR=ee-ar -j\$(nproc)

              # 6. FINAL LINK
              echo '--- LINKING AVP.ELF ---'
              CRT0_OBJ=\$PS2SDK/ee/startup/crt0.o
              LINKFILE=\$PS2SDK/ee/startup/linkfile
              
              ee-gcc -T\$LINKFILE -L\$PS2SDK/ee/lib \
                -o AVP.ELF \
                \$CRT0_OBJ \
                mame2000_libretro_ps2.a \
                -lpatches -ldebug -lstdc++ -lc -lm -lkernel
              
              echo '--- DONE ---'
              ls -lh AVP.ELF
            "

      - name: Upload ELF
        uses: actions/upload-artifact@v4
        with:
          name: avp-ps2-elf
          path: AVP.ELF
